name: Secret Scan

on:
  push:
  pull_request:

jobs:
  scan:
    name: Run secret scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run secret scanner
        run: |
          python3 scripts/secret_scan.py

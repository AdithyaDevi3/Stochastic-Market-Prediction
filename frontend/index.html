<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Stochastic Market Prediction</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body{font-family:system-ui,Arial;margin:20px}
      #controls{margin-bottom:12px}
    </style>
  </head>
  <body>
    <h1>Stochastic Market Prediction</h1>
    <div id="controls">
      <label>Symbol: <input id="symbol" value="^GSPC" /></label>
      <label>Simulations: <input id="sims" type="number" value="500"/></label>
      <button id="load">Load & Simulate</button>
    </div>

    <canvas id="chart" width="1000" height="400"></canvas>

    <script>
      const api = (path)=> `http://localhost:8000${path}`
      const ctx = document.getElementById('chart').getContext('2d')
      let chart = null

      async function load(){
        const symbol = document.getElementById('symbol').value
        const sims = parseInt(document.getElementById('sims').value || '500')
        const histRes = await fetch(api(`/history?symbol=${encodeURIComponent(symbol)}`))
        const hist = await histRes.json()
        const labels = hist.data.map(d=> d.Date)
        const prices = hist.data.map(d=> d.Close)

        const simRes = await fetch(api('/simulate'), {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({symbol, sims, steps:252})})
        const sim = await simRes.json()

        const datasets = [
          {label: symbol + ' Close', data: prices, borderColor:'black', fill:false, tension:0},
        ]

        // overlay sample simulations if available
        if(sim.simulations_sample){
          sim.simulations_sample.forEach((s,i)=>{
            // s is array of length steps+1
            datasets.push({label:`sim ${i+1}`, data: s, borderColor:`hsla(${(i*40)%360},80%,50%,0.6)`, fill:false, pointRadius:0, tension:0})
          })
        }

        if(chart) chart.destroy()
        chart = new Chart(ctx, {type:'line', data:{labels, datasets}, options:{scales:{x:{display:false}}}})
      }

      document.getElementById('load').addEventListener('click', load)
    </script>
  </body>
</html>

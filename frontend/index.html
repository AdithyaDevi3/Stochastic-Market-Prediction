<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Stochastic Market Prediction</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body{font-family:system-ui,Arial;margin:20px}
      #controls{margin-bottom:12px}
    </style>
  </head>
  <body>
    <h1>Stochastic Market Prediction</h1>
    <div id="controls">
      <label>Symbol: <input id="symbol" value="^GSPC" /></label>
      <label>Simulations: <input id="sims" type="number" value="500"/></label>
      <label>AR weight: <input id="arweight" type="range" min="0" max="1" step="0.05" value="0.3" /> <span id="arweightVal">0.3</span></label>
      <button id="load">Load & Simulate</button>
    </div>

    <div id="var" style="margin-top:8px;font-weight:600"></div>

    <canvas id="chart" width="1000" height="400"></canvas>

    <script>
      const api = (path)=> `http://localhost:8000${path}`
      const ctx = document.getElementById('chart').getContext('2d')
      let chart = null

      async function load(){
        const symbol = document.getElementById('symbol').value
        const sims = parseInt(document.getElementById('sims').value || '500')
        const histRes = await fetch(api(`/history?symbol=${encodeURIComponent(symbol)}`))
        const hist = await histRes.json()
        const labels = hist.data.map(d=> d.Date)
        const prices = hist.data.map(d=> d.Close)

  const arweight = parseFloat(document.getElementById('arweight').value)
  const simRes = await fetch(api('/ensemble_simulate'), {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({symbol, sims, steps:252, ar_weight: arweight})})
  const sim = await simRes.json()

        const datasets = [
          {label: symbol + ' Close', data: prices, borderColor:'black', fill:false, tension:0},
        ]

        // draw percentile bands: we'll draw lower/upper as filled areas
        // Chart.js fills between datasets if dataset.fill = '+1' (relative). We'll add datasets in order: 95,75,50,25,5 so fills work.
        const pct = sim.percentiles || {}
        if(Object.keys(pct).length){
          // median
          datasets.push({label:'median', data: pct['50'], borderColor:'blue', backgroundColor:'rgba(0,0,255,0.05)', fill:false, pointRadius:0, tension:0})
          // 25-75 band
          datasets.push({label:'p75', data: pct['75'], borderColor:'rgba(0,128,0,0.0)', backgroundColor:'rgba(0,128,0,0.08)', fill:'+1', pointRadius:0, tension:0})
          datasets.push({label:'p25', data: pct['25'], borderColor:'rgba(0,128,0,0.0)', backgroundColor:'rgba(0,128,0,0.08)', fill:false, pointRadius:0, tension:0})
          // 5-95 outer band
          datasets.push({label:'p95', data: pct['95'], borderColor:'rgba(255,165,0,0.0)', backgroundColor:'rgba(255,165,0,0.06)', fill:'+1', pointRadius:0, tension:0})
          datasets.push({label:'p5', data: pct['5'], borderColor:'rgba(255,165,0,0.0)', backgroundColor:'rgba(255,165,0,0.06)', fill:false, pointRadius:0, tension:0})
        }

        // show VaR if provided
        const varEl = document.getElementById('var')
        if(sim.var5 !== undefined){
          varEl.textContent = `5% VaR (relative): ${Number(sim.var5).toFixed(4)}`
        } else { varEl.textContent = '' }

        if(chart) chart.destroy()
        chart = new Chart(ctx, {type:'line', data:{labels, datasets}, options:{scales:{x:{display:false}}}})
      }

      // update AR weight label on slider input
      document.getElementById('arweight').addEventListener('input', (e)=>{
        document.getElementById('arweightVal').textContent = e.target.value
      })

      document.getElementById('load').addEventListener('click', load)
    </script>
  </body>
</html>

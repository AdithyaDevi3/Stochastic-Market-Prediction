<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Stochastic Market Prediction</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body{font-family:system-ui,Arial;margin:20px}
      #controls{margin-bottom:12px}
    </style>
  </head>
  <body>
    <h1>Stochastic Market Prediction</h1>
    <div id="controls">
      <label>Symbol: <input id="symbol" value="^GSPC" /></label>
      <label>Simulations: <input id="sims" type="number" value="500"/></label>
      <label>AR weight: <input id="arweight" type="range" min="0" max="1" step="0.05" value="0.3" /> <span id="arweightVal">0.3</span></label>
  <button id="load">Load & Simulate</button>
  <button id="play">Play</button>
  <button id="exportCsv">Export CSV</button>
  <button id="exportPng">Export PNG</button>
      <label>Speed: <input id="speed" type="range" min="1" max="60" step="1" value="10"/> <span id="speedVal">10</span> fps</label>
    </div>

    <div id="var" style="margin-top:8px;font-weight:600"></div>

    <canvas id="chart" width="1000" height="400"></canvas>

    <script>
      const api = (path)=> `http://localhost:8000${path}`
      const ctx = document.getElementById('chart').getContext('2d')
      let chart = null

      async function load(){
        const symbol = document.getElementById('symbol').value
        const sims = parseInt(document.getElementById('sims').value || '500')
        const histRes = await fetch(api(`/history?symbol=${encodeURIComponent(symbol)}`))
        const hist = await histRes.json()
        const labels = hist.data.map(d=> d.Date)
        const prices = hist.data.map(d=> d.Close)

  const arweight = parseFloat(document.getElementById('arweight').value)
  const simRes = await fetch(api('/ensemble_simulate'), {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({symbol, sims, steps:252, ar_weight: arweight})})
  const sim = await simRes.json()

        const datasets = [
          {label: symbol + ' Close', data: prices, borderColor:'black', fill:false, tension:0},
        ]

        // draw percentile bands: we'll draw lower/upper as filled areas
        // Chart.js fills between datasets if dataset.fill = '+1' (relative). We'll add datasets in order: 95,75,50,25,5 so fills work.
        const pct = sim.percentiles || {}
        if(Object.keys(pct).length){
          // median
          datasets.push({label:'median', data: pct['50'], borderColor:'blue', backgroundColor:'rgba(0,0,255,0.05)', fill:false, pointRadius:0, tension:0})
          // 25-75 band
          datasets.push({label:'p75', data: pct['75'], borderColor:'rgba(0,128,0,0.0)', backgroundColor:'rgba(0,128,0,0.08)', fill:'+1', pointRadius:0, tension:0})
          datasets.push({label:'p25', data: pct['25'], borderColor:'rgba(0,128,0,0.0)', backgroundColor:'rgba(0,128,0,0.08)', fill:false, pointRadius:0, tension:0})
          // 5-95 outer band
          datasets.push({label:'p95', data: pct['95'], borderColor:'rgba(255,165,0,0.0)', backgroundColor:'rgba(255,165,0,0.06)', fill:'+1', pointRadius:0, tension:0})
          datasets.push({label:'p5', data: pct['5'], borderColor:'rgba(255,165,0,0.0)', backgroundColor:'rgba(255,165,0,0.06)', fill:false, pointRadius:0, tension:0})
        }

        // show VaR if provided
        const varEl = document.getElementById('var')
        if(sim.var5 !== undefined){
          varEl.textContent = `5% VaR (relative): ${Number(sim.var5).toFixed(4)}`
        } else { varEl.textContent = '' }

        if(chart) chart.destroy()
        chart = new Chart(ctx, {type:'line', data:{labels, datasets}, options:{scales:{x:{display:false}}}})
      }

      // update AR weight label on slider input
      document.getElementById('arweight').addEventListener('input', (e)=>{
        document.getElementById('arweightVal').textContent = e.target.value
      })

      // Animation controls
      let playing = false
      let frame = 0
      let animInterval = null
      function renderFrame(f){
        // rotate visibility of simulation datasets (those with label sim N or median/p25/p75/p5/p95 use their data up to f)
        if(!chart) return
        chart.data.datasets.forEach(ds=>{
          if(Array.isArray(ds.data)){
            // show only up to index f
            ds._originalData = ds._originalData || ds.data.slice()
            ds.data = ds._originalData.slice(0, Math.max(1, f))
          }
        })
        chart.update('none')
      }

      function startAnimation(){
        if(playing) return
        playing = true
        const fps = parseInt(document.getElementById('speed').value || '10')
        const delay = 1000 / Math.max(1,fps)
        const maxLen = (chart && chart.data && chart.data.datasets && chart.data.datasets[0]) ? chart.data.datasets[0].data.length : 252
        frame = 1
        animInterval = setInterval(()=>{
          frame = (frame >= maxLen) ? 1 : frame + 1
          renderFrame(frame)
        }, delay)
        document.getElementById('play').textContent = 'Pause'
      }

      function stopAnimation(){
        playing = false
        if(animInterval) clearInterval(animInterval)
        animInterval = null
        document.getElementById('play').textContent = 'Play'
      }

      document.getElementById('play').addEventListener('click', ()=>{
        if(playing) stopAnimation(); else startAnimation();
      })
      document.getElementById('speed').addEventListener('input', (e)=>{
        document.getElementById('speedVal').textContent = e.target.value
        if(playing){ stopAnimation(); startAnimation(); }
      })

      // Export CSV of percentiles
      document.getElementById('exportCsv').addEventListener('click', ()=>{
        if(!chart) return alert('No data to export')
        // assume percentile datasets are labeled p5,p25,50,75,95 or median
        const labels = chart.data.labels || []
        const rows = []
        // header
        const header = ['index','date']
        chart.data.datasets.forEach(ds=> header.push(ds.label))
        rows.push(header.join(','))
        for(let i=0;i<labels.length;i++){
          const r = [i, labels[i]]
          chart.data.datasets.forEach(ds=> r.push(ds._originalData ? (ds._originalData[i]===undefined?'':ds._originalData[i]) : (ds.data[i]===undefined?'':ds.data[i])))
          rows.push(r.join(','))
        }
        const csv = rows.join('\n')
        const blob = new Blob([csv], {type:'text/csv'})
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url; a.download = `${document.getElementById('symbol').value || 'sim'}-percentiles.csv`;
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url)
      })

      // Export PNG (chart image)
      document.getElementById('exportPng').addEventListener('click', ()=>{
        if(!chart) return alert('No chart to export')
        const url = chart.toBase64Image()
        const a = document.createElement('a')
        a.href = url; a.download = `${document.getElementById('symbol').value || 'sim'}-chart.png`;
        document.body.appendChild(a); a.click(); a.remove()
      })

      document.getElementById('load').addEventListener('click', load)
    </script>
  </body>
</html>
